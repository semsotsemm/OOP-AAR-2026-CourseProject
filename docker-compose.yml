services:
  postgres:
    image: postgres:17-alpine
    container_name: rewind-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: "5329965"
      POSTGRES_DB: rewinddb
    ports:
      # Пробрасываем 5432 на localhost, чтобы Rewind.exe (строка
      # подключения Host=localhost;Port=5432) достучался без правок кода.
      - "5432:5432"
    volumes:
      - rewind-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d rewinddb"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  rewind-pgdata:
